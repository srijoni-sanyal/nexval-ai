<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexVal AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #0a0f1c;
    color: #e5e7eb;
}

.header {
    padding: 20px 40px;
    font-size: 28px;
    color: #22c55e;
    display: flex;
    justify-content: space-between;
}

.brand {
    font-size: 14px;
    color: #9ca3af;
}

.subtitle {
    font-size: 14px;
    color: #9ca3af;
    margin-left: 40px;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px 40px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    flex: 1;
}

input {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

.kpi {
    margin: 10px 0;
    font-size: 18px;
}

.low { color: #22c55e; }
.moderate { color: #facc15; }
.high { color: #ef4444; }

.buy { color: #22c55e; font-weight: bold; }
.hold { color: #facc15; font-weight: bold; }
.avoid { color: #ef4444; font-weight: bold; }

.chart-container {
    overflow-x: auto;
}

.chart-inner {
    min-width: 800px;
}

</style>
</head>

<body>

<div class="header">
    NexVal AI
    <div class="brand">Powered by Srijoni Sanyal ✨</div>
</div>

<div class="subtitle">
AI-powered financial valuation & risk analysis platform
</div>

<div class="container">

<div class="card">
<h3>Inputs</h3>

<input id="revenue" placeholder="Initial Revenue">
<input id="growth" placeholder="Growth Rate (0.1 = 10%)">
<input id="costs" placeholder="Costs">
<input id="years" placeholder="Years">
<input id="discount" placeholder="Discount Rate">
<input id="country" placeholder="Country (India / USA / UAE)">

<button onclick="analyze()">Run Analysis</button>
<button onclick="downloadPDF()">Download Report 📄</button>
</div>

<div class="card" id="report">
<h3>Insight</h3>
<p id="output"></p>

<h3>KPIs</h3>
<div class="kpi">NPV: <span id="npv"></span></div>
<div class="kpi">Best: <span id="best"></span></div>
<div class="kpi">Worst: <span id="worst"></span></div>
<div class="kpi">IRR: <span id="irr"></span></div>
<div class="kpi">Risk: <span id="risk"></span></div>
<div class="kpi">Recommendation: <span id="decision"></span></div>

<div class="chart-container">
<div class="chart-inner">
<canvas id="chart"></canvas>
</div>
</div>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>

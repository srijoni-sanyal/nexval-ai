<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexVal AI Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #0a0f1c;
    color: #e5e7eb;
}

.header {
    padding: 20px 40px;
    font-size: 28px;
    font-weight: 600;
    color: #22c55e;
    display: flex;
    justify-content: space-between;
}

.brand {
    font-size: 14px;
    color: #9ca3af;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px 40px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    flex: 1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.kpi {
    font-size: 22px;
    margin: 10px 0;
}

.low { color: #22c55e; }
.moderate { color: #facc15; }
.high { color: #ef4444; }

canvas {
    margin-top: 20px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #9ca3af;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    NexVal AI Dashboard
    <div class="brand">Powered by Srijoni Sanyal ✨</div>
</div>

<div class="container">

    <!-- INPUT PANEL -->
    <div class="card">
        <h3>Inputs</h3>

        <input id="revenue" placeholder="Initial Revenue">
        <input id="growth" placeholder="Growth Rate (0.1 = 10%)">
        <input id="costs" placeholder="Costs">
        <input id="years" placeholder="Years">
        <input id="discount" placeholder="Discount Rate">
        <input id="country" placeholder="Country (India / USA / UAE)">

        <button onclick="analyze()">Run Analysis</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="card">
        <h3>Insight</h3>
        <p id="output"></p>

        <h3>KPIs</h3>
        <div class="kpi">NPV: <span id="npv"></span></div>
        <div class="kpi">Best: <span id="best"></span></div>
        <div class="kpi">Worst: <span id="worst"></span></div>
        <div class="kpi">IRR: <span id="irr"></span></div>
        <div class="kpi">Risk: <span id="risk"></span></div>

        <canvas id="chart" height="200"></canvas>
    </div>

</div>

<div class="footer">
    NexVal AI • Financial Intelligence Engine
</div>

<script src="dashboard.js"></script>

</body>
</html>
